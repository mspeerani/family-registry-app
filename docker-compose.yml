services:
  api:
    image: node:24-bookworm-slim
    working_dir: /app
    command: sh -c "npm ci && npm --workspace apps/api run dev"
    env_file:
      - .env
    environment:
      APP_ENV: development
      APP_PORT: 3001
      DATABASE_URL: file:/data/family_registry.sqlite
      UPLOAD_DIR: /data/uploads
    ports:
      - "3001:3001"
    volumes:
      - ./:/app
      - family_registry_data:/data

  web:
    image: node:24-bookworm-slim
    working_dir: /app
    command: sh -c "npm ci && npm --workspace apps/web run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
    depends_on:
      - api

volumes:
  family_registry_data:

